name: Daily Movie News Scraper

on:
  # Run daily at 8:00 AM Taiwan time (00:00 UTC)
  schedule:
    - cron: '0 0 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Ensure data directory exists
        run: |
          mkdir -p data/news

      - name: Run scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd scraper
          python main.py

      - name: Commit and push if changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          echo "Checking for changes in data/news/..."
          ls -la data/news/ || echo "Directory is empty or doesn't exist"
          if [ -d "data/news" ] && [ "$(ls -A data/news)" ]; then
            git add data/news/
            if git diff --quiet && git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "🤖 Auto-update: Daily movie news $(date +'%Y-%m-%d')"
              git push
              echo "✅ Changes committed and pushed!"
            fi
          else
            echo "⚠️  No news data to commit"
          fi
